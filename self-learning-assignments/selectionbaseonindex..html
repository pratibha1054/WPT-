<html>
    <head>
        <title>
            Get Single Element using JQuery
        </title>
        <script src="https;//code.jquery.com/jquery-3.6.0.min.js"></script>
        <script>
            $(document).ready(function(){
                var element = $("p").eq(1);

                element.css("color","red");
            });
        </script>
    </head>
    <body>
        <p>First Program</p>
        <p>Second Program</p>
        <p>Third Program</p>
    </body>
</html>
