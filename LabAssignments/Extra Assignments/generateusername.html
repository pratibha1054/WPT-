<!DOCTYPE html>
<html>
<head>
<title>Username Generator</title>
</head>

<body>

<h2>Username Generator</h2>

<label>First Name:</label>
<input type="text" id="fname"><br><br>

<label>Last Name:</label>
<input type="text" id="lname"><br><br>

<label>Birth Date:</label>
<input type="date" id="bdate"><br><br>

<button onclick="generateUsername()">Generate Username</button>

<p id="result"></p>

<script>

function generateUsername() {

    let firstName = document.getElementById("fname").value;
    let lastName = document.getElementById("lname").value;
    let birthDate = document.getElementById("bdate").value;

    let firstPart = firstName.substring(0,2).toLowerCase();

    let lastPart = lastName.slice(-2).toLowerCase();

    let birthYear = new Date(birthDate).getFullYear();
    let currentYear = new Date().getFullYear();
    let age = currentYear - birthYear;

    let username = firstPart + age + lastPart

    document.getElementById("result").innerText = "Generated Username: " + username;
}

</script>

</body>
</html>
