<!DOCTYPE html>
<html>

<head>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

</head>

<body>

<button id="btn">Click</button>

<p id="p1"></p>
<p id="p2"></p>
<p id="p3"></p>

<script>

$("#btn").click(function(){

$("#p1").text("Hello");

$("#p2").html("<b>Pratibha</b>");

$("#p3").html("<u>How are you</u>");

});

</script>

</body>
</html>
