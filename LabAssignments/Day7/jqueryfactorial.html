<!DOCTYPE html>
<html>

<head>
    <title>JQuery Factorial program</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

</head>

<body>

Enter Number:
<input type="number" id="num">

<p id="result"></p>

<script>

$("#num").change(function(){

let n = parseInt($("#num").val());

let fact = 1;

for(let i=1;i<=n;i++){
fact = fact * i;
}

$("#result").text("Factorial : " + fact);

});

</script>

</body>
</html>
