<!DOCTYPE html>
<html>
<body>

<h3>Object Example</h3>

<p id="result"></p>

<script>

let b = {
id:100,
name:"Pratibha",
email:"pratibha95nikam@gmail.com"
};

let text = " ";

for(let key in b){
text = text + key + " : " + b[key] + "<br>";
}

document.getElementById("result").innerHTML = text;

</script>

</body>
</html>
