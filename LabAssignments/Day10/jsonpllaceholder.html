<!DOCTYPE html>
<html>
<head>
    <title>AJAX POST Example</title>
</head>
<body>

<h2>Create Todo</h2>

<form>
    Title: <input type="text" id="title"><br><br>
    User ID: <input type="number" id="userid"><br><br>
    <button type="button" onclick="postData()">Submit</button>
</form>

<h3 id="result"></h3>

<script>

function postData(){

    // Get user input
    var title = document.getElementById("title").value;
    var userid = document.getElementById("userid").value;

    // Create object
    var todo = {
        title: title,
        userId: userid,
        completed: false
    };

    // Create AJAX request
    var xhr = new XMLHttpRequest();

    xhr.open("POST","https://jsonplaceholder.typicode.com/todos",true);

    xhr.setRequestHeader("Content-Type","application/json");

    xhr.onreadystatechange = function(){
        if(xhr.readyState == 4 && xhr.status == 201){
            document.getElementById("result").innerHTML =
            "Data Posted Successfully<br>" + xhr.responseText;
        }
    };

    // Convert object to JSON and send
    xhr.send(JSON.stringify(todo));
}

</script>

</body>
</html>
