<!DOCTYPE html>
<html>
<head>
<title>jQuery Load Example</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script>
$(document).ready(function(){

    $("#btn").click(function(){
        $("#content").load("data.html");
    });

});
</script>

</head>

<body>

<h2>Main Page</h2>

<button id="btn">Load Content</button>

<div id="content" style="border:1px solid black; padding:10px; margin-top:10px;">
Content will load here
</div>

</body>
</html>
