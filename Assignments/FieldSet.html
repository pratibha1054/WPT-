<html>

<head>
    <meta charset="UTF-8">
    <title>Field Set</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            padding: 20px;
        }

        h3 {
            margin-bottom: 5px;
        }

        fieldset {
            border: 1px solid #ccc;
            margin-bottom: 15px;
            padding: 15px;
            width: fit-content;
            min-width: 400px;
        }

        legend {
            font-weight: bold;
            padding: 0 5px;
        }

        .form-group {
            margin-bottom: 10px;
            display: flex;
            align-items: center;
        }
    </style>

</head>

<body>
    <form action="">
        <h3>HTML Legend Tag</h3>

        <fieldset>
            <legend>STUDENT::</legend>
            <div class="form-group">
                <label for="">Name: </label>
                <input type="text" style="margin-left: 10px; " required>
            </div>
            <div class="form-group">
                <label for="">Email: </label>
                <input type="email" style="margin-left: 10px;" required>
            </div>
             <div class="form-group">
                <label for="">Password: </label>
                <input type="password"  id ="pass" name="pass" style="margin-left: 10px;" required minlength="5" maxlength="8">
            </div>
            
            <div class="form-group">
                <label for="">Date Of Birth: </label>
                <input type="date" style="margin-left: 10px;" required>
            </div>
            <div class="form-group">
                <label for="">Address: </label>
                <input type="text" style="margin-left: 10px;" required>
            </div>
            <div class="form-group">
                <label for="">Enroll Number: </label>
                <input type="number" style="margin-left: 10px;" required>
            </div>

            <fieldset>
                <legend>Occuption</legend>
                <div class="">
                    <label for="student"> Student </label>
                    <input type="radio" name="occu" id="student" value="student">
                    <label for="business"> Business </label>
                    <input type="radio" name="occu" id="business" value="business">
                </div>
            </fieldset>
            <button type="submit">submit</button>
        </fieldset>
    </form>
</body>

</html>
